name: Release

on:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
            strip: strip
          - target: aarch64-unknown-linux-gnu
            use_cross: true
            strip: aarch64-linux-gnu-strip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross

      - name: Install cross-compilation tools
        if: matrix.use_cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: ${{ matrix.strip }} target/${{ matrix.target }}/release/swaptop

      - name: Package tarball
        run: |
          TAG="${{ github.event.release.tag_name }}"
          ARCHIVE="swaptop-${TAG}-${{ matrix.target }}.tar.gz"
          tar -czf "${ARCHIVE}" -C target/${{ matrix.target }}/release swaptop
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Generate SHA256
        run: |
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "SHA256_FILE=${ARCHIVE}.sha256" >> "$GITHUB_ENV"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${ARCHIVE}" \
            "${SHA256_FILE}" \
            --clobber

  checksums:
    name: Consolidated checksums
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all sha256 files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "*.sha256"

      - name: Generate SHA256SUMS.txt
        run: |
          cat *.sha256 > SHA256SUMS.txt

      - name: Upload SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            SHA256SUMS.txt \
            --repo "${{ github.repository }}" \
            --clobber
